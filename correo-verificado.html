<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificación de correo · Ricardo Ruiz</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    @font-face { font-family:'HelveticaNeue'; src:url('fonts/helveticaneue.woff2') format('woff2'); font-weight:400; font-style:normal; font-display:swap; }
    @font-face { font-family:'HelveticaNeue'; src:url('fonts/helveticaneue-medium.woff2') format('woff2'); font-weight:500; font-style:normal; font-display:swap; }
    @font-face { font-family:'HelveticaNeue'; src:url('fonts/helveticaneue-bold.woff2') format('woff2'); font-weight:600 900; font-style:normal; font-display:swap; }

    :root {
      --white: #f4f3ef;
      --blue: #0047FF;
      --blue-light: #3d6fff;
      --green: #4ade80;
      --orange: #f97316;
      --red: #ff5c5c;
      --card-border: rgba(255,255,255,0.1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      background: #060810; color: var(--white);
      font-family: 'HelveticaNeue', Helvetica, 'Helvetica Neue', Arial, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 1.5rem; text-align: center;
    }
    body::before { content:''; position:fixed; inset:0; z-index:-1;
      background:
        radial-gradient(1100px 600px at 78% -8%, rgba(0,71,255,0.18), transparent 60%),
        radial-gradient(900px 500px at 12% 108%, rgba(0,71,255,0.10), transparent 60%),
        #060810; }

    .logo-link { display:flex; align-items:center; gap:.55rem; text-decoration:none; opacity:.9; margin-bottom:2.2rem; }
    .logo-bars { display:flex; align-items:flex-end; gap:3px; height:20px; }
    .logo-bar { width:5px; background:var(--blue); border-radius:1px 1px 0 0; opacity:.85; }
    .logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; letter-spacing:-.03em; color:var(--white); line-height:1; }
    .logo-text span { color:var(--blue); }

    .box { background:rgba(10,10,16,0.8); border:1px solid var(--card-border); backdrop-filter:blur(8px);
      padding:2.6rem 2.2rem 2.2rem; max-width:440px; width:100%; }

    .state-icon { font-size:2.8rem; line-height:1; margin-bottom:1.2rem; }
    .state-icon.ok { color:var(--green); }
    .state-icon.err { color:var(--red); }

    h1 { font-weight:800; font-size:1.45rem; letter-spacing:-.02em; margin-bottom:.7rem; }
    .sub { font-weight:400; font-size:.9rem; line-height:1.65; color:rgba(255,255,255,.55); margin-bottom:1.6rem; }
    .sub strong { color:var(--white); font-weight:700; }

    .actions { display:flex; flex-direction:column; gap:.6rem; }
    .btn { font-weight:700; font-size:.8rem; letter-spacing:.08em; text-transform:uppercase;
      padding:.75rem 1.2rem; text-decoration:none; cursor:pointer; border:1.5px solid transparent;
      transition:background .2s,border-color .2s,color .2s; }
    .btn-primary { background:var(--blue); color:var(--white); border-color:var(--blue); }
    .btn-primary:hover { background:#0035cc; border-color:#0035cc; }
    .btn-ghost { background:none; color:var(--white); border-color:rgba(255,255,255,.28); }
    .btn-ghost:hover { border-color:var(--white); }

    .hint { font-size:.7rem; color:rgba(255,255,255,.35); margin-top:1.3rem; line-height:1.6; }
    .hint a { color:rgba(255,255,255,.55); }

    @media (max-width: 480px) { .box { padding:2rem 1.4rem 1.7rem; } }
  </style>
</head>
<body>

  <a href="index.html" class="logo-link">
    <div class="logo-bars">
      <div class="logo-bar" style="height:20px"></div>
      <div class="logo-bar" style="height:15px"></div>
      <div class="logo-bar" style="height:9px"></div>
      <div class="logo-bar" style="height:4px"></div>
    </div>
    <span class="logo-text">Ricardo<span>.</span>Ruiz</span>
  </a>

  <div class="box">
    <div class="state-icon ok" id="icon-ok" style="display:none">✓</div>
    <div class="state-icon err" id="icon-err" style="display:none">✕</div>

    <h1 id="title">Verificando tu correo…</h1>
    <p class="sub" id="sub">Un momento.</p>

    <div class="actions">
      <a class="btn btn-primary" id="btn-login" href="login.html" style="display:none">Iniciar sesión →</a>
      <a class="btn btn-ghost" id="btn-register" href="elige-plan.html" style="display:none">Crear una cuenta</a>
    </div>

    <p class="hint" id="hint" style="display:none">Si el problema persiste, escríbenos a <a href="mailto:hola@ricardoruiz.co">hola@ricardoruiz.co</a> y te ayudamos a activar tu cuenta.</p>
  </div>

  <script>
    // ─── Página de confirmación tras el link de verificación de correo ───────
    // El worker rr-auth redirige aquí con:
    //   ?ok=1                 → correo verificado con éxito
    //   ?error=invalid        → token inválido
    //   ?error=expired        → token expirado (48h)
    //   ?error=notfound       → token no encontrado
    const qs = new URLSearchParams(location.search);
    const ok = qs.get('ok') === '1';
    const error = qs.get('error');

    const el = id => document.getElementById(id);
    function show(id){ el(id).style.display = 'block'; }

    if (ok) {
      show('icon-ok');
      el('title').textContent = '¡Tu correo quedó verificado!';
      el('sub').innerHTML = 'Tu cuenta está activa. Ya puedes <strong>iniciar sesión</strong> y empezar a usar la plataforma.';
      show('btn-login');
    } else if (error === 'expired') {
      show('icon-err');
      el('title').textContent = 'El enlace expiró';
      el('sub').innerHTML = 'Los enlaces de verificación duran <strong>48 horas</strong>. Inicia sesión y te ofrecemos reenviar el correo.';
      show('btn-login');
      show('hint');
    } else if (error === 'notfound') {
      show('icon-err');
      el('title').textContent = 'No encontramos ese enlace';
      el('sub').innerHTML = 'Puede que ya hayas verificado tu correo antes. Intenta iniciar sesión.';
      show('btn-login');
      show('hint');
    } else if (error) {
      show('icon-err');
      el('title').textContent = 'Enlace inválido';
      el('sub').innerHTML = 'Este enlace de verificación no es válido. Si ya te registraste, intenta iniciar sesión.';
      show('btn-login');
      show('hint');
    } else {
      // Llegaron aquí sin parámetros (link directo, sin pasar por el worker)
      show('icon-err');
      el('title').textContent = 'Nada que verificar aquí';
      el('sub').innerHTML = 'Esta página solo tiene sentido desde el enlace de verificación que te enviamos por correo.';
      show('btn-register');
      show('hint');
    }
  </script>
</body>
</html>
